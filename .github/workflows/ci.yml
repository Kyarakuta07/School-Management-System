name: 🔄 Continuous Integration

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

jobs:
  # Job 1: PHP Linting
  php-lint:
    name: 🐘 PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo, pdo_mysql

      - name: Check PHP Syntax
        run: |
          echo "Checking PHP syntax in ci4_poc/app..."
          find moe/app -name "*.php" -print0 | xargs -0 -n1 php -l
          echo "✅ Syntax check passed!"

  # Job 2: Security Scan
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Security Check
        run: |
          echo "🔍 Checking for common security issues in ci4_poc..."

          # Check for exposed credentials in view files
          if grep -rn "password\s*=\s*['\"]" moe/app --include="*.php" | grep -v "Config" | grep -v "//"; then
            echo "⚠️ Potential hardcoded passwords found"
          fi

          echo "✅ Security scan completed"

  # Job 3: Summary
  summary:
    name: 📋 CI Summary
    runs-on: ubuntu-latest
    needs: [php-lint, security]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 🔄 CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PHP Lint | ${{ needs.php-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result == 'success' && '✅ Passed' || '⚠️ Check Needed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📅 Run: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
