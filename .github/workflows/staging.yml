name: 🧪 Pre-Production Checks

on:
  push:
    branches:
      - develop
      - feature/*
  pull_request:
    branches:
      - main

# Prevent concurrent runs
concurrency:
  group: pre-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: PHP Lint Check
  lint:
    name: 🐘 PHP Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo, pdo_mysql

      - name: 🔍 PHP Syntax Check
        run: |
          echo "Checking PHP syntax in ci4_poc/app..."
          find moe/app -name "*.php" -print0 | xargs -0 -n1 php -l
          echo "✅ Syntax check passed!"

  # Job 2: Summary
  summary:
    name: 📋 Summary
    runs-on: ubuntu-latest
    needs: [lint]
    if: always()
    steps:
      - name: 📋 Generate Summary
        run: |
          echo "## 🧪 Pre-Production Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PHP Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📅 $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
