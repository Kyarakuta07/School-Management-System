name: 🚀 Deployment Otomatis ke cPanel (FTP Sync)

on:
  push:
    branches:
      - main

# Memastikan deploy tidak tabrakan
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  # Job 1: PHP Lint Check
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Kode
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo, pdo_mysql

      - name: 🔍 Check PHP Syntax (moe)
        run: |
          echo "Checking PHP syntax in moe/app..."
          find moe/app -name "*.php" -print0 | xargs -0 -n1 php -l
          echo "✅ Syntax check passed!"

  # Job 2: Deploy ke cPanel menggunakan FTP
  # Last updated: 2026-03-01 - Updated to ci4_poc structure
  deploy:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout Kode
        uses: actions/checkout@v4

      - name: 🚀 Sync Files via FTP (Auto-Delete)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./moe/
          server-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/node_modules/**
            **/.env*
            **/*.env
            .env
            .htaccess
            **/.htaccess
            *.log
            **/*.log
            error_log
            writable/logs/**
            writable/cache/**
            writable/session/**
            writable/uploads/**
            vendor/**
            *.sql
            *.sql.gz
            *.bak
            *.backup

      - name: 🏥 Health Check
        run: |
          echo "⏳ Menunggu server sinkronisasi (10 detik)..."
          sleep 10
          echo "🔍 Mengecek https://www.moegypt.com ..."

          for i in 1 2 3; do
            if curl -f -s -o /dev/null -w "%{http_code}" https://www.moegypt.com; then
              echo "✅ Website accessible! (HTTP 200)"
              exit 0
            else
              echo "⚠️ Attempt $i gagal, retry..."
              sleep 5
            fi
          done

          echo "❌ Website tidak bisa diakses!"
          exit 1

      - name: 📋 Deploy Summary
        if: success()
        run: |
          echo "=========================================="
          echo "🎉 DEPLOYMENT BERHASIL & SYNCED!"
          echo "=========================================="
          echo "📅 Waktu: $(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M:%S WIB')"
          echo "🌐 Website: https://www.moegypt.com"
          echo "📂 Source: moe/ → server root"
          echo "=========================================="